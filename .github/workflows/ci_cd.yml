name: CI/CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache des dépendances pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Exécution des tests
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sélection de l'espace Hugging Face
        id: vars
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "hf_space=${{ vars.HF_SPACE_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "hf_space=${{ vars.HF_SPACE_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Déploiement sur Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="${{ steps.vars.outputs.hf_space }}",
              repo_type="space",
              ignore_patterns=[
                  "docs/",
                  "tests/",
                  ".git/",
                  ".github/",
                  "__pycache__/",
                  "*.pyc",
                  "*.pyo",
                  ".env",
                  ".env.*",
              ],
          )
          EOF